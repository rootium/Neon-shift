<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEON SHIFT 3</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    touch-action: none;
    user-select: none;
  }
  canvas {
    display: block;
    position: fixed;
    top: 0; left: 0;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  makeStars();
});

// ─── AUDIO ENGINE ────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function initAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

// Core tone player — 8-bit square/triangle waves
function playTone(freq, type, duration, volume, startTime, endFreq) {
  if (!audioCtx) return;
  const t = startTime || audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, t);
  if (endFreq) osc.frequency.exponentialRampToValueAtTime(endFreq, t + duration);
  gain.gain.setValueAtTime(volume || 0.15, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
  osc.start(t);
  osc.stop(t + duration + 0.01);
}

// ── Sound Effects ──

function sfxStart() {
  initAudio();
  // Rising arp: C D E G
  const notes = [261, 329, 392, 523];
  notes.forEach((f, i) => playTone(f, 'square', 0.1, 0.12, audioCtx.currentTime + i * 0.07));
}

function sfxDeath() {
  initAudio();
  // Descending crash
  playTone(400, 'square', 0.08, 0.18, audioCtx.currentTime, 80);
  playTone(200, 'square', 0.15, 0.12, audioCtx.currentTime + 0.08, 40);
  playTone(80,  'square', 0.25, 0.10, audioCtx.currentTime + 0.18, 40);
  // Noise burst
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.2, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
  const src = audioCtx.createBufferSource();
  const g = audioCtx.createGain();
  src.buffer = buf; src.connect(g); g.connect(audioCtx.destination);
  g.gain.setValueAtTime(0.2, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
  src.start(audioCtx.currentTime);
}

function sfxLaserWarn() {
  initAudio();
  // Rising ping
  playTone(300, 'sine', 0.12, 0.08, audioCtx.currentTime, 600);
}

function sfxLaserFire() {
  initAudio();
  playTone(900, 'sawtooth', 0.06, 0.09, audioCtx.currentTime, 200);
}

function sfxScore() {
  initAudio();
  // Small blip every 10 points
  playTone(880, 'square', 0.04, 0.06);
}

function sfxNewBest() {
  initAudio();
  // Victory jingle
  const melody = [523, 659, 784, 1047];
  melody.forEach((f, i) => playTone(f, 'square', 0.12, 0.13, audioCtx.currentTime + i * 0.1));
}

function sfxMove() {
  if (!audioCtx) return;
  // Subtle thrust tick — very quiet, not annoying
  playTone(120, 'square', 0.03, 0.03);
}

function sfxPowerUp() {
  initAudio();
  // Magical ascending chime
  const notes = [523, 659, 784, 1047, 1319];
  notes.forEach((f, i) => playTone(f, 'sine', 0.1, 0.13, audioCtx.currentTime + i * 0.06));
}

function sfxPowerEnd() {
  initAudio();
  // Descending warn — power wearing off
  const notes = [880, 660, 440, 330];
  notes.forEach((f, i) => playTone(f, 'square', 0.08, 0.08, audioCtx.currentTime + i * 0.05));
}

let lastSfxScore = 0;
let laserWarnPlayed = new Set();

// ─── ADMOB ───────────────────────────────────────────────
const AD_UNIT_ID = 'ca-app-pub-8800005383508089/3053133462';
let adLoaded = false;
let adWatched = false; // only 1 continue per game session
let showingAd = false;

async function initAdMob() {
  try {
    const { AdMob } = window.Capacitor?.Plugins || {};
    if (!AdMob) return;
    await AdMob.initialize({ testingDevices: [], initializeForTesting: false });
    loadRewardedAd();
  } catch(e) { console.log('AdMob init error:', e); }
}

async function loadRewardedAd() {
  try {
    const { AdMob } = window.Capacitor?.Plugins || {};
    if (!AdMob) return;
    await AdMob.prepareRewardVideoAd({ adId: AD_UNIT_ID });
    adLoaded = true;
  } catch(e) { console.log('Ad load error:', e); }
}

async function showRewardedAd() {
  try {
    const { AdMob } = window.Capacitor?.Plugins || {};
    if (!AdMob || !adLoaded) {
      // No ad available — give free continue anyway (fallback)
      continueGame();
      return;
    }
    showingAd = true;
    const result = await AdMob.showRewardVideoAd();
    showingAd = false;
    if (result?.value) {
      // Player watched the full ad — reward them
      adWatched = true;
      adLoaded = false;
      continueGame();
      loadRewardedAd(); // preload next ad
    }
  } catch(e) {
    showingAd = false;
    console.log('Ad show error:', e);
    continueGame(); // fallback — give continue anyway
  }
}

function continueGame() {
  // Revive player at safe position, keep score
  state = 'play';
  P.alive = true;
  P.x = W / 2;
  P.vx = 0;
  P.trail = [];
  // Clear nearby obstacles so player isn't immediately killed
  spikes = spikes.filter(s => Math.abs(s.y - P.y) > 120);
  lasers = lasers.filter(l => Math.abs(l.x - P.x) > 100);
  particles = [];
  makeStars();
}

// ─── STATE ───────────────────────────────────────────────
let state = 'start';
let score = 0;
let hiScore = parseInt(localStorage.getItem('ns_hi') || '0');
let frame = 0;
let deadTimer = 0;
let menuFrame = 0;

// ─── PLAYER ──────────────────────────────────────────────
const P = {
  x: 0, y: 0, w: 30,
  vx: 0, alive: true, trail: [],
  reset() {
    this.x = W / 2;
    this.y = H - 100;
    this.vx = 0;
    this.alive = true;
    this.trail = [];
  }
};

// ─── OBJECTS ─────────────────────────────────────────────
let spikes = [];
let lasers = [];
let particles = [];
let stars = [];
let menuParticles = [];
let hexagons = [];
let powerups = [];

// ─── POWER-UP STATE ──────────────────────────────────────
const SHRINK_DURATION = 300; // frames (~5 seconds)
let shrinkTimer = 0;
let shrinking = false;

function makeStars() {
  stars = [];
  for (let i = 0; i < 120; i++)
    stars.push({
      x: Math.random()*W, y: Math.random()*H,
      r: Math.random()*1.8+0.2,
      s: Math.random()*0.5+0.1,
      twinkle: Math.random()*Math.PI*2
    });
}

function makeHexagons() {
  hexagons = [];
  for (let i = 0; i < 6; i++) {
    hexagons.push({
      x: Math.random()*W,
      y: Math.random()*H,
      size: 30 + Math.random()*80,
      rot: Math.random()*Math.PI*2,
      rotSpeed: (Math.random()-0.5)*0.01,
      alpha: 0.03 + Math.random()*0.06,
      col: Math.random() < 0.5 ? '#0ff' : '#f0f'
    });
  }
}

// ─── INPUT ───────────────────────────────────────────────
const keys = { left: false, right: false };

window.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  keys.left  = true;
  if (e.key === 'ArrowRight') keys.right = true;
  if ((e.key === ' ' || e.key === 'Enter') && state !== 'play') beginGame();
});
window.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft')  keys.left  = false;
  if (e.key === 'ArrowRight') keys.right = false;
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state === 'dead') {
    if (deadTimer <= 60) return; // wait for buttons to appear
    const cx = W / 2;
    const touch = e.changedTouches[0];
    const tx = touch.clientX, ty = touch.clientY;
    const btnW = Math.min(W * 0.78, 300);
    const btnH = H * 0.068;
    const adBtnY = H * 0.78;
    const retryBtnY = adWatched ? H * 0.82 : H * 0.895;
    // Watch Ad button
    if (!adWatched && Math.abs(tx - cx) < btnW/2 && Math.abs(ty - adBtnY) < btnH/2) {
      showRewardedAd();
      return;
    }
    // Retry button
    if (Math.abs(tx - cx) < btnW/2 && Math.abs(ty - retryBtnY) < btnH/2) {
      beginGame();
      return;
    }
    return;
  }
  if (state !== 'play') { beginGame(); return; }
  for (const t of e.changedTouches) {
    if (t.clientX < W / 2) keys.left  = true;
    else                    keys.right = true;
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  let l = false, r = false;
  for (const t of e.targetTouches) {
    if (t.clientX < W / 2) l = true; else r = true;
  }
  keys.left = l; keys.right = r;
}, { passive: false });

canvas.addEventListener('touchcancel', () => { keys.left = keys.right = false; });

canvas.addEventListener('mousedown', e => {
  if (state === 'dead') {
    if (deadTimer <= 60) return;
    const cx = W / 2;
    const mx = e.clientX, my = e.clientY;
    const btnW = Math.min(W * 0.78, 300);
    const btnH = H * 0.068;
    const adBtnY = H * 0.78;
    const retryBtnY = adWatched ? H * 0.82 : H * 0.895;
    if (!adWatched && Math.abs(mx - cx) < btnW/2 && Math.abs(my - adBtnY) < btnH/2) {
      showRewardedAd(); return;
    }
    if (Math.abs(mx - cx) < btnW/2 && Math.abs(my - retryBtnY) < btnH/2) {
      beginGame(); return;
    }
    return;
  }
  if (state !== 'play') { beginGame(); return; }
  if (e.clientX < W / 2) keys.left  = true;
  else                    keys.right = true;
});
canvas.addEventListener('mouseup', () => { keys.left = keys.right = false; });

// ─── LIFECYCLE ───────────────────────────────────────────
function beginGame() {
  initAudio();
  sfxStart();
  state = 'play';
  frame = 0; score = 0; lastSfxScore = 0;
  adWatched = false;
  shrinkTimer = 0; shrinking = false; P.w = 30;
  laserWarnPlayed = new Set();
  spikes = []; lasers = []; particles = []; powerups = [];
  P.reset();
  makeStars();
}

function killPlayer() {
  if (!P.alive) return;
  P.alive = false;
  state = 'dead';
  deadTimer = 0;
  for (let i = 0; i < 60; i++) {
    const a = (Math.PI * 2 * i) / 60;
    const sp = 2 + Math.random() * 8;
    particles.push({
      x: P.x, y: P.y,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 1,
      col: i % 3 === 0 ? '#0ff' : i % 3 === 1 ? '#f0f' : '#ff0',
      r: 2 + Math.random() * 4
    });
  }
  const isNewBest = score > hiScore;
  if (isNewBest) { hiScore = score; localStorage.setItem('ns_hi', hiScore); }
  sfxDeath();
  if (isNewBest) setTimeout(sfxNewBest, 400);
}

// ─── UPDATE ──────────────────────────────────────────────
function update() {
  menuFrame++;

  if (state === 'start') {
    // Animate hexagons on menu
    for (const h of hexagons) h.rot += h.rotSpeed;
    // Spawn floating menu particles occasionally
    if (menuFrame % 8 === 0) {
      menuParticles.push({
        x: Math.random()*W,
        y: H + 10,
        vx: (Math.random()-0.5)*0.8,
        vy: -(0.5 + Math.random()*1.5),
        life: 1,
        r: 1 + Math.random()*2,
        col: Math.random() < 0.5 ? '#0ff' : '#f0f'
      });
    }
    for (let i = menuParticles.length-1; i>=0; i--) {
      const p = menuParticles[i];
      p.x += p.vx; p.y += p.vy;
      p.life -= 0.004;
      if (p.life <= 0 || p.y < -10) menuParticles.splice(i, 1);
    }
    // Scroll stars slowly on menu
    for (const s of stars) {
      s.y += s.s * 0.3;
      s.twinkle += 0.05;
      if (s.y > H) { s.y = 0; s.x = Math.random()*W; }
    }
    return;
  }

  if (state === 'dead') { deadTimer++; tickParticles(); return; }
  if (state !== 'play') return;

  frame++;
  score = Math.floor(frame / 10);
  const spd = 1 + frame / 500;

  // Score blip every 10 points
  if (score > 0 && score % 10 === 0 && score !== lastSfxScore) {
    lastSfxScore = score;
    sfxScore();
  }

  // Movement sound
  if ((keys.left || keys.right) && frame % 12 === 0) sfxMove();

  // Stars scroll
  for (const s of stars) {
    s.y += s.s * spd * 0.4;
    s.twinkle += 0.05;
    if (s.y > H) { s.y = 0; s.x = Math.random()*W; }
  }

  // Player
  const maxVX = 7 + spd * 0.4;
  if (keys.left)  P.vx -= 1.6;
  if (keys.right) P.vx += 1.6;
  if (!keys.left && !keys.right) P.vx *= 0.78;
  P.vx = Math.max(-maxVX, Math.min(maxVX, P.vx));
  P.x += P.vx;
  if (P.x < P.w/2)     { P.x = P.w/2;     P.vx = 0; }
  if (P.x > W - P.w/2) { P.x = W - P.w/2; P.vx = 0; }
  P.trail.unshift({ x: P.x, y: P.y });
  if (P.trail.length > 14) P.trail.pop();

  // Spawn spikes
  const si = Math.max(20, 72 - frame / 22);
  if (frame % Math.floor(si) === 0) {
    const sz = 18 + Math.random() * 18;
    spikes.push({
      x: sz + Math.random() * (W - sz * 2),
      y: -sz * 2,
      sz,
      vy: 2.5 + spd + Math.random() * 1.2,
      hue: Math.random() < 0.5 ? '#ff3355' : '#ff8800'
    });
  }

  // Spawn vertical lasers — beam comes from top, player must move out of the way
  const li = Math.max(140, 300 - frame / 5);
  if (frame % Math.floor(li) === 0) {
    const beamW = 28 + Math.random() * 20;
    lasers.push({
      x: beamW + Math.random() * (W - beamW * 2),
      beamW,
      t: 0, warn: 55, total: 130,
      col: Math.random() < 0.5 ? '#f0f' : '#ff3355'
    });
  }

  // ── Shrink power-up timer ──
  if (shrinking) {
    shrinkTimer--;
    // Warn player when 3 seconds left
    if (shrinkTimer === 90) sfxPowerEnd();
    if (shrinkTimer <= 0) {
      shrinking = false;
      P.w = 30; // back to normal size
    }
  }

  // Spawn power-up every ~400 frames, randomly
  if (frame % 400 === 200) {
    powerups.push({
      x: 40 + Math.random() * (W - 80),
      y: -30,
      vy: 1.8 + Math.random() * 0.8,
      r: 14,
      pulse: Math.random() * Math.PI * 2,
      collected: false
    });
  }

  // Update power-ups
  for (let i = powerups.length - 1; i >= 0; i--) {
    const pu = powerups[i];
    pu.y += pu.vy;
    pu.pulse += 0.08;
    if (pu.y > H + 30) { powerups.splice(i, 1); continue; }
    // Collection check
    const dx = P.x - pu.x, dy = P.y - pu.y;
    if (Math.sqrt(dx*dx + dy*dy) < pu.r + P.w * 0.5) {
      // Collected!
      powerups.splice(i, 1);
      shrinking = true;
      shrinkTimer = SHRINK_DURATION;
      P.w = 14; // shrink to less than half size
      sfxPowerUp();
      // Spawn collect particles
      for (let j = 0; j < 20; j++) {
        const a = (Math.PI * 2 * j) / 20;
        particles.push({
          x: pu.x, y: pu.y,
          vx: Math.cos(a) * (2 + Math.random() * 3),
          vy: Math.sin(a) * (2 + Math.random() * 3),
          life: 1, col: '#00ff88', r: 2 + Math.random() * 3
        });
      }
    }
  }
  for (let i = spikes.length - 1; i >= 0; i--) {
    const s = spikes[i];
    s.y += s.vy;
    if (s.y > H + s.sz * 2) { spikes.splice(i, 1); continue; }
    const dx = P.x - s.x, dy = P.y - s.y;
    if (Math.sqrt(dx*dx + dy*dy) < s.sz * 0.7 + P.w * 0.45) { killPlayer(); return; }
  }

  // Update lasers
  for (let i = lasers.length - 1; i >= 0; i--) {
    const l = lasers[i];
    l.t++;
    if (l.t > l.total) { lasers.splice(i, 1); continue; }
    // Warn sound once
    if (l.t === 1) sfxLaserWarn();
    // Fire sound once
    if (l.t === l.warn) sfxLaserFire();
    // Collision — only during fire phase
    if (l.t >= l.warn && l.t < l.total) {
      if (Math.abs(P.x - l.x) < l.beamW / 2 + P.w * 0.4) {
        killPlayer(); return;
      }
    }
  }

  tickParticles();
}

function tickParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.14;
    p.life -= 0.022;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ─── DRAW HELPERS ────────────────────────────────────────
function glow(col, blur) { ctx.shadowColor = col; ctx.shadowBlur = blur; }
function noGlow() { ctx.shadowBlur = 0; }

function drawHexagon(x, y, size, rot, alpha, col) {
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = col;
  ctx.lineWidth = 1.5;
  glow(col, 8);
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = rot + (Math.PI / 3) * i;
    const px = x + size * Math.cos(a);
    const py = y + size * Math.sin(a);
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.stroke();
  noGlow();
  ctx.globalAlpha = 1;
}

function drawBG() {
  ctx.fillStyle = '#00000f';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = '#ffffff07';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 55) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 55) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Stars
  for (const s of stars) {
    const twinkleAlpha = 0.3 + 0.5 * Math.abs(Math.sin(s.twinkle));
    ctx.globalAlpha = twinkleAlpha;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawMenuBG() {
  ctx.fillStyle = '#00000f';
  ctx.fillRect(0, 0, W, H);

  // Subtle radial gradient overlay
  const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, H*0.7);
  grad.addColorStop(0, 'rgba(0,255,255,0.04)');
  grad.addColorStop(0.5, 'rgba(255,0,255,0.02)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Grid with perspective feel
  ctx.strokeStyle = '#ffffff06';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 55) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 55) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Twinkling stars
  for (const s of stars) {
    const twinkleAlpha = 0.2 + 0.6 * Math.abs(Math.sin(s.twinkle));
    ctx.globalAlpha = twinkleAlpha;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Floating hexagons
  for (const h of hexagons) drawHexagon(h.x, h.y, h.size, h.rot, h.alpha, h.col);

  // Floating particles
  for (const p of menuParticles) {
    ctx.globalAlpha = p.life * 0.7;
    glow(p.col, 10);
    ctx.fillStyle = p.col;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  noGlow();
}

function drawPlayer() {
  if (!P.alive) return;

  // Trail
  for (let i = P.trail.length - 1; i >= 0; i--) {
    const t = P.trail[i];
    ctx.globalAlpha = (1 - i / P.trail.length) * 0.3;
    ctx.fillStyle = '#0ff';
    ctx.beginPath(); ctx.arc(t.x, t.y, (1 - i/P.trail.length) * P.w * 0.55, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Diamond
  const x = P.x, y = P.y, s = P.w / 2;
  glow('#0ff', 28);
  ctx.fillStyle = '#0ff';
  ctx.beginPath();
  ctx.moveTo(x, y - s);
  ctx.lineTo(x + s * 0.7, y);
  ctx.lineTo(x, y + s * 0.7);
  ctx.lineTo(x - s * 0.7, y);
  ctx.closePath();
  ctx.fill();

  noGlow();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(x, y - s*0.45);
  ctx.lineTo(x + s*0.32, y);
  ctx.lineTo(x, y + s*0.32);
  ctx.lineTo(x - s*0.32, y);
  ctx.closePath();
  ctx.fill();

  // Touch zone arrows
  ctx.globalAlpha = 0.18;
  ctx.fillStyle = '#0ff';
  ctx.font = `${Math.round(H * 0.05)}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('◄', W * 0.22, H - 28);
  ctx.fillText('►', W * 0.78, H - 28);
  ctx.globalAlpha = 1;
}

function drawSpikes() {
  for (const s of spikes) {
    glow(s.hue, 20);
    ctx.strokeStyle = s.hue;
    ctx.fillStyle = s.hue + '55';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(s.x, s.y + s.sz);
    ctx.lineTo(s.x - s.sz*0.75, s.y - s.sz*0.5);
    ctx.lineTo(s.x + s.sz*0.75, s.y - s.sz*0.5);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(s.x, s.y + s.sz*0.45, 3, 0, Math.PI*2); ctx.fill();
    noGlow();
  }
}

function drawLasers() {
  for (const l of lasers) {
    if (l.t < l.warn) {
      // ── WARNING PHASE ── vertical dashed line from top + target marker
      const blink = Math.floor(l.t / 6) % 2 === 0;
      const warnAlpha = 0.3 + 0.7 * (l.t / l.warn);

      // Dashed vertical warning line
      ctx.globalAlpha = blink ? warnAlpha : warnAlpha * 0.25;
      glow(l.col, 14);
      ctx.strokeStyle = l.col;
      ctx.lineWidth = 3;
      ctx.setLineDash([12, 9]);
      ctx.beginPath(); ctx.moveTo(l.x, 0); ctx.lineTo(l.x, H); ctx.stroke();
      ctx.setLineDash([]);
      noGlow();

      // Danger zone highlight column
      ctx.globalAlpha = blink ? 0.12 : 0.04;
      ctx.fillStyle = l.col;
      ctx.fillRect(l.x - l.beamW/2, 0, l.beamW, H);

      // Target crosshair at player level
      ctx.globalAlpha = blink ? 0.9 : 0.3;
      glow(l.col, 16);
      ctx.strokeStyle = l.col;
      ctx.lineWidth = 2;
      // Horizontal cross tick
      ctx.beginPath();
      ctx.moveTo(l.x - 20, P.y);
      ctx.lineTo(l.x - 6, P.y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(l.x + 6, P.y);
      ctx.lineTo(l.x + 20, P.y);
      ctx.stroke();
      // Circle
      ctx.beginPath();
      ctx.arc(l.x, P.y, 14, 0, Math.PI * 2);
      ctx.stroke();
      noGlow();

      // Warning label at top
      ctx.globalAlpha = blink ? 1 : 0.4;
      ctx.font = `bold ${Math.round(H * 0.022)}px monospace`;
      ctx.textAlign = 'center';
      glow(l.col, 10);
      ctx.fillStyle = l.col;
      ctx.fillText('⚠', l.x, 36);
      noGlow();
      ctx.globalAlpha = 1;

    } else {
      // ── FIRE PHASE ── full vertical beam from top to bottom
      const prog = (l.t - l.warn) / (l.total - l.warn);
      const fade = prog < 0.08 ? prog/0.08 : prog > 0.65 ? (1-prog)/0.35 : 1;

      // Outer glow
      ctx.globalAlpha = 0.12 * fade;
      glow(l.col, 50);
      ctx.strokeStyle = l.col;
      ctx.lineWidth = l.beamW * 2.5;
      ctx.beginPath(); ctx.moveTo(l.x, 0); ctx.lineTo(l.x, H); ctx.stroke();

      // Mid glow
      ctx.globalAlpha = 0.35 * fade;
      ctx.lineWidth = l.beamW;
      ctx.beginPath(); ctx.moveTo(l.x, 0); ctx.lineTo(l.x, H); ctx.stroke();

      // Core beam
      ctx.globalAlpha = fade;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = l.beamW * 0.35;
      glow('#ffffff', 10);
      ctx.beginPath(); ctx.moveTo(l.x, 0); ctx.lineTo(l.x, H); ctx.stroke();

      noGlow();
      ctx.globalAlpha = 1;
    }
  }
  ctx.globalAlpha = 1;
  ctx.setLineDash([]);
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    glow(p.col, 12);
    ctx.fillStyle = p.col;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  noGlow();
}

function drawPowerups() {
  for (const pu of powerups) {
    const pulse = 0.7 + 0.3 * Math.sin(pu.pulse);
    // Outer glow ring
    ctx.globalAlpha = 0.25 * pulse;
    glow('#00ff88', 20);
    ctx.strokeStyle = '#00ff88';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(pu.x, pu.y, pu.r + 8, 0, Math.PI*2); ctx.stroke();
    // Inner circle
    ctx.globalAlpha = 0.9 * pulse;
    ctx.fillStyle = '#00ff88';
    glow('#00ff88', 16);
    ctx.beginPath(); ctx.arc(pu.x, pu.y, pu.r, 0, Math.PI*2); ctx.fill();
    // Small diamond icon inside
    noGlow();
    ctx.fillStyle = '#000';
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.moveTo(pu.x, pu.y - 6);
    ctx.lineTo(pu.x + 5, pu.y);
    ctx.lineTo(pu.x, pu.y + 6);
    ctx.lineTo(pu.x - 5, pu.y);
    ctx.closePath();
    ctx.fill();
    // Rotating sparkles around it
    for (let i = 0; i < 4; i++) {
      const a = pu.pulse + (Math.PI / 2) * i;
      const sx = pu.x + Math.cos(a) * (pu.r + 14);
      const sy = pu.y + Math.sin(a) * (pu.r + 14);
      ctx.globalAlpha = 0.6 * pulse;
      ctx.fillStyle = '#00ff88';
      glow('#00ff88', 8);
      ctx.beginPath(); ctx.arc(sx, sy, 2.5, 0, Math.PI*2); ctx.fill();
    }
    noGlow();
    ctx.globalAlpha = 1;
    // SHRINK label above
    ctx.fillStyle = '#00ff88';
    ctx.font = `bold ${Math.round(H * 0.016)}px monospace`;
    ctx.textAlign = 'center';
    ctx.globalAlpha = pulse;
    ctx.fillText('SHRINK', pu.x, pu.y - pu.r - 12);
    ctx.globalAlpha = 1;
  }
}

function drawShrinkHUD() {
  if (!shrinking) return;
  const barW = Math.min(W * 0.5, 200);
  const barH = 8;
  const barX = W / 2 - barW / 2;
  const barY = 90;
  const pct = shrinkTimer / SHRINK_DURATION;
  const col = pct > 0.4 ? '#00ff88' : '#ff8800';

  // Background
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.roundRect(barX, barY, barW, barH, 4);
  ctx.fill();

  // Fill
  ctx.globalAlpha = 1;
  glow(col, 12);
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.roundRect(barX, barY, barW * pct, barH, 4);
  ctx.fill();
  noGlow();

  // Label
  ctx.fillStyle = col;
  ctx.font = `bold ${Math.round(H * 0.018)}px monospace`;
  ctx.textAlign = 'center';
  glow(col, 8);
  ctx.fillText('▼ SHRINK', W / 2, barY - 4);
  noGlow();
  ctx.globalAlpha = 1;
}

function drawHUD() {
  ctx.textAlign = 'center';
  glow('#0ff', 14);
  ctx.fillStyle = '#0ff';
  ctx.font = `bold ${Math.round(H * 0.042)}px monospace`;
  ctx.fillText(String(score).padStart(4, '0'), W/2, 46);
  noGlow();
  ctx.fillStyle = '#f0f7';
  ctx.font = `${Math.round(H * 0.022)}px monospace`;
  ctx.fillText('BEST ' + String(hiScore).padStart(4,'0'), W/2, 72);
}

// ─── DRAW MENU LOGO ─────────────────────────────────────
function drawMenuLogo() {
  const t = menuFrame;
  const cx = W / 2;

  // Animated cyan line above NEON
  const lineW = Math.min(W * 0.55, 260);
  const lineY = H * 0.18;
  glow('#0ff', 12);
  ctx.strokeStyle = '#0ff';
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.moveTo(cx - lineW/2, lineY);
  ctx.lineTo(cx + lineW/2, lineY);
  ctx.stroke();
  // tick marks
  for (let i = 0; i <= 8; i++) {
    const tx = cx - lineW/2 + (lineW/8)*i;
    const th = i % 4 === 0 ? 10 : 5;
    ctx.beginPath();
    ctx.moveTo(tx, lineY);
    ctx.lineTo(tx, lineY - th);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
  noGlow();

  // NEON — big glowing cyan
  const neonSize = Math.round(H * 0.13);
  ctx.textAlign = 'center';
  ctx.font = `900 ${neonSize}px monospace`;

  // Outer glow layers
  glow('#0ff', 60);
  ctx.fillStyle = 'rgba(0,255,255,0.15)';
  ctx.fillText('NEON', cx, H * 0.32);
  glow('#0ff', 30);
  ctx.fillStyle = 'rgba(0,255,255,0.4)';
  ctx.fillText('NEON', cx, H * 0.32);
  glow('#0ff', 12);
  ctx.fillStyle = '#0ff';
  ctx.fillText('NEON', cx, H * 0.32);
  noGlow();

  // SHIFT — big glowing magenta
  const shiftSize = Math.round(H * 0.13);
  ctx.font = `900 ${shiftSize}px monospace`;

  glow('#f0f', 60);
  ctx.fillStyle = 'rgba(255,0,255,0.15)';
  ctx.fillText('SHIFT', cx, H * 0.46);
  glow('#f0f', 30);
  ctx.fillStyle = 'rgba(255,0,255,0.4)';
  ctx.fillText('SHIFT', cx, H * 0.46);
  glow('#f0f', 12);
  ctx.fillStyle = '#f0f';
  ctx.fillText('SHIFT', cx, H * 0.46);
  noGlow();

  // Separator line with diamond in center
  const sepY = H * 0.515;
  const sepW = Math.min(W * 0.5, 200);
  ctx.globalAlpha = 0.4;
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1;
  glow('#fff', 4);
  ctx.beginPath(); ctx.moveTo(cx - sepW/2, sepY); ctx.lineTo(cx - 18, sepY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + 18, sepY); ctx.lineTo(cx + sepW/2, sepY); ctx.stroke();
  // Diamond in center
  ctx.fillStyle = '#0ff';
  glow('#0ff', 12);
  ctx.beginPath();
  ctx.moveTo(cx, sepY - 6);
  ctx.lineTo(cx + 8, sepY);
  ctx.lineTo(cx, sepY + 6);
  ctx.lineTo(cx - 8, sepY);
  ctx.closePath();
  ctx.fill();
  noGlow();
  ctx.globalAlpha = 1;

  // Tagline
  ctx.font = `bold ${Math.round(H * 0.028)}px monospace`;
  ctx.fillStyle = '#ff8800';
  glow('#ff8800', 10);
  ctx.fillText('DODGE EVERYTHING', cx, H * 0.585);
  noGlow();

  // Controls hint
  ctx.font = `${Math.round(H * 0.019)}px monospace`;
  ctx.fillStyle = '#ffffff33';
  ctx.fillText('◄ TAP LEFT  ·  TAP RIGHT ►', cx, H * 0.645);

  // Animated start button
  const pulse = 0.6 + 0.4 * Math.sin(t / 28);
  const btnY = H * 0.76;
  const btnW = Math.min(W * 0.62, 260);
  const btnH = H * 0.072;

  // Button background
  ctx.globalAlpha = 0.12 * pulse;
  ctx.fillStyle = '#0ff';
  roundRect(cx - btnW/2, btnY - btnH/2, btnW, btnH, 8);
  ctx.fill();

  // Button border
  ctx.globalAlpha = pulse * 0.9;
  glow('#0ff', 18);
  ctx.strokeStyle = '#0ff';
  ctx.lineWidth = 2;
  roundRect(cx - btnW/2, btnY - btnH/2, btnW, btnH, 8);
  ctx.stroke();
  noGlow();

  // Button text — vertically centered inside button
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#fff';
  const startFontSize = Math.round(H * 0.030);
  ctx.font = `bold ${startFontSize}px monospace`;
  ctx.textBaseline = 'middle';
  glow('#0ff', 10);
  ctx.fillText('▶  TAP TO START', cx, btnY);
  ctx.textBaseline = 'alphabetic';
  noGlow();
  ctx.globalAlpha = 1;

  // Best score badge
  if (hiScore > 0) {
    const badgeY = H * 0.875;
    const badgeW = 160;
    const badgeH = 34;
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = '#f0f';
    roundRect(cx - badgeW/2, badgeY - badgeH/2, badgeW, badgeH, 20);
    ctx.fill();
    ctx.globalAlpha = 0.5;
    ctx.strokeStyle = '#f0f';
    ctx.lineWidth = 1;
    roundRect(cx - badgeW/2, badgeY - badgeH/2, badgeW, badgeH, 20);
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#f0f';
    ctx.font = `bold ${Math.round(H * 0.022)}px monospace`;
    glow('#f0f', 8);
    ctx.fillText('✦ BEST  ' + String(hiScore).padStart(4,'0'), cx, badgeY + 7);
    noGlow();
  } else {
    ctx.fillStyle = '#ffffff22';
    ctx.font = `${Math.round(H * 0.018)}px monospace`;
    ctx.fillText('NO RECORD YET', cx, H * 0.875);
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawStart() {
  drawMenuBG();
  drawMenuLogo();
}

function drawDead() {
  drawBG();
  drawParticles();
  ctx.textAlign = 'center';

  // GAME OVER
  glow('#f0f', 40);
  ctx.fillStyle = 'rgba(255,0,255,0.15)';
  ctx.font = `bold ${Math.round(H * 0.095)}px monospace`;
  ctx.fillText('GAME', W/2, H * 0.28);
  ctx.fillText('OVER', W/2, H * 0.41);
  glow('#f0f', 20);
  ctx.fillStyle = '#f0f';
  ctx.fillText('GAME', W/2, H * 0.28);
  ctx.fillText('OVER', W/2, H * 0.41);
  noGlow();

  // Score box
  const sbY = H * 0.52;
  const sbW = Math.min(W * 0.6, 240);
  const sbH = H * 0.1;
  ctx.globalAlpha = 0.1;
  ctx.fillStyle = '#0ff';
  roundRect(W/2 - sbW/2, sbY - sbH/2, sbW, sbH, 10);
  ctx.fill();
  ctx.globalAlpha = 0.3;
  ctx.strokeStyle = '#0ff';
  ctx.lineWidth = 1.5;
  roundRect(W/2 - sbW/2, sbY - sbH/2, sbW, sbH, 10);
  ctx.stroke();
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#0ff';
  ctx.font = `${Math.round(H * 0.022)}px monospace`;
  ctx.fillText('SCORE', W/2, sbY - 6);
  glow('#0ff', 14);
  ctx.font = `bold ${Math.round(H * 0.042)}px monospace`;
  ctx.fillText(String(score).padStart(4,'0'), W/2, sbY + H*0.032);
  noGlow();

  if (score > 0 && score >= hiScore) {
    const p2 = 0.5 + 0.5 * Math.sin(Date.now() / 300);
    ctx.globalAlpha = p2;
    glow('#ff0', 18);
    ctx.fillStyle = '#ff0';
    ctx.font = `bold ${Math.round(H * 0.03)}px monospace`;
    ctx.fillText('✦  NEW BEST  ✦', W/2, H * 0.66);
    ctx.globalAlpha = 1;
    noGlow();
  }

  ctx.fillStyle = '#ffffff33';
  ctx.font = `${Math.round(H * 0.02)}px monospace`;
  ctx.fillText('BEST: ' + String(hiScore).padStart(4,'0'), W/2, H * 0.73);

  if (deadTimer > 60) {
    const pulse = 0.6 + 0.4 * Math.sin(Date.now() / 420);
    const cx = W / 2;
    const btnW = Math.min(W * 0.78, 300);
    const btnH = H * 0.068;
    ctx.textBaseline = 'middle';

    // ── WATCH AD BUTTON (only show once per session) ──
    if (!adWatched) {
      const adBtnY = H * 0.78;
      // Gold background
      ctx.globalAlpha = 0.2 * pulse;
      ctx.fillStyle = '#ffaa00';
      roundRect(cx - btnW/2, adBtnY - btnH/2, btnW, btnH, 10);
      ctx.fill();
      // Gold border
      ctx.globalAlpha = pulse;
      glow('#ffaa00', 22);
      ctx.strokeStyle = '#ffaa00';
      ctx.lineWidth = 2.5;
      roundRect(cx - btnW/2, adBtnY - btnH/2, btnW, btnH, 10);
      ctx.stroke();
      noGlow();
      // Button text — perfectly centered
      ctx.globalAlpha = pulse;
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.round(H * 0.026)}px monospace`;
      glow('#ffaa00', 10);
      ctx.fillText('▶ WATCH AD · CONTINUE', cx, adBtnY);
      noGlow();
      ctx.globalAlpha = 1;
      // Small info text below
      ctx.globalAlpha = 0.6;
      ctx.fillStyle = '#ffdd88';
      ctx.font = `${Math.round(H * 0.016)}px monospace`;
      ctx.fillText('keep your score!', cx, adBtnY + btnH/2 + 14);
      ctx.globalAlpha = 1;
    }

    // ── RETRY BUTTON ──
    const retryBtnY = adWatched ? H * 0.82 : H * 0.895;
    ctx.globalAlpha = 0.12 * pulse;
    ctx.fillStyle = '#0ff';
    roundRect(cx - btnW/2, retryBtnY - btnH/2, btnW, btnH, 10);
    ctx.fill();
    ctx.globalAlpha = pulse * 0.85;
    glow('#0ff', 16);
    ctx.strokeStyle = '#0ff';
    ctx.lineWidth = 2;
    roundRect(cx - btnW/2, retryBtnY - btnH/2, btnW, btnH, 10);
    ctx.stroke();
    noGlow();
    // Button text — perfectly centered
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.round(H * 0.026)}px monospace`;
    glow('#0ff', 8);
    ctx.fillText('▶  TAP TO RETRY', cx, retryBtnY);
    noGlow();
    ctx.globalAlpha = 1;
    ctx.textBaseline = 'alphabetic';
  }
}

// ─── LOOP ────────────────────────────────────────────────
function loop() {
  update();
  if (state === 'start')     drawStart();
  else if (state === 'play') { drawBG(); drawParticles(); drawPowerups(); drawLasers(); drawSpikes(); drawPlayer(); drawHUD(); drawShrinkHUD(); }
  else if (state === 'dead') drawDead();
  requestAnimationFrame(loop);
}

makeStars();
makeHexagons();
initAdMob();
loop();
</script>
