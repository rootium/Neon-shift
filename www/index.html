<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEON SHIFT v6</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; touch-action: none; user-select: none; }
  canvas { display: block; position: fixed; top: 0; left: 0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;

// Safe zones for notch/navigation bar
const SAFEt = 48; // top safe padding
const SAFEb = 52; // bottom safe padding

window.addEventListener('resize', () => {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  makeStars();
});

// ═══════════════════════════════════════════
// AUDIO ENGINE
// ═══════════════════════════════════════════
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playTone(freq, type, dur, vol, t0, endFreq) {
  if (!S.sound) return;
  if (!audioCtx) return;
  const t = t0 || audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, t);
  if (endFreq) osc.frequency.exponentialRampToValueAtTime(endFreq, t + dur);
  gain.gain.setValueAtTime(vol || 0.15, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.start(t); osc.stop(t + dur + 0.01);
}
function sfxStart()   { initAudio(); [261,329,392,523].forEach((f,i) => playTone(f,'square',0.1,0.12,audioCtx.currentTime+i*0.07)); }
function sfxDeath()   {
  initAudio();
  playTone(400,'square',0.08,0.18,audioCtx.currentTime,80);
  playTone(200,'square',0.15,0.12,audioCtx.currentTime+0.08,40);
  playTone(80, 'square',0.25,0.10,audioCtx.currentTime+0.18,40);
  const buf = audioCtx.createBuffer(1,audioCtx.sampleRate*0.2,audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
  const s=audioCtx.createBufferSource(), g=audioCtx.createGain();
  s.buffer=buf; s.connect(g); g.connect(audioCtx.destination);
  g.gain.setValueAtTime(0.2,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2);
  s.start(audioCtx.currentTime);
}
function sfxNewBest() { initAudio(); [523,659,784,1047].forEach((f,i) => playTone(f,'square',0.12,0.13,audioCtx.currentTime+i*0.1)); }
function sfxScore()   { initAudio(); playTone(880,'square',0.04,0.06); }
function sfxMove()    { if (!audioCtx) return; playTone(120,'square',0.03,0.03); }
function sfxLaserWarn(){ initAudio(); playTone(300,'sine',0.12,0.08,audioCtx.currentTime,600); }
function sfxLaserFire(){ initAudio(); playTone(900,'sawtooth',0.06,0.09,audioCtx.currentTime,200); }
function sfxShieldHit(){ initAudio(); playTone(300,'square',0.08,0.18,audioCtx.currentTime,150); playTone(150,'square',0.15,0.12,audioCtx.currentTime+0.08,80); }
function sfxPowerSlow(){ initAudio(); playTone(800,'sine',0.3,0.12,audioCtx.currentTime,200); playTone(400,'sine',0.3,0.10,audioCtx.currentTime+0.15,100); }
function sfxPowerShield(){ initAudio(); [440,660,880,1100].forEach((f,i)=>playTone(f,'sine',0.12,0.12,audioCtx.currentTime+i*0.06)); }
function sfxPowerEnd(){ initAudio(); [880,660,440,330].forEach((f,i)=>playTone(f,'square',0.08,0.08,audioCtx.currentTime+i*0.05)); }
function sfxCombo(lvl){ initAudio(); const f=[523,659,784,1047][Math.min(lvl,3)]; playTone(f,'square',0.06,0.09); }

// ═══════════════════════════════════════════
// ADMOB
// ═══════════════════════════════════════════
const AD_UNIT_ID = 'ca-app-pub-8800005383508089/3053133462';
let adLoaded = false, adWatched = false, showingAd = false;
async function initAdMob() {
  try {
    const { AdMob } = window.Capacitor?.Plugins || {};
    if (!AdMob) return;
    await AdMob.initialize({ testingDevices: [], initializeForTesting: false });
    loadRewardedAd();
  } catch(e) {}
}
async function loadRewardedAd() {
  try {
    const { AdMob } = window.Capacitor?.Plugins || {};
    if (!AdMob) return;
    await AdMob.prepareRewardVideoAd({ adId: AD_UNIT_ID });
    adLoaded = true;
  } catch(e) {}
}
async function showRewardedAd() {
  try {
    const { AdMob } = window.Capacitor?.Plugins || {};
    if (!AdMob || !adLoaded) { continueGame(); return; }
    showingAd = true;
    const result = await AdMob.showRewardVideoAd();
    showingAd = false;
    if (result?.value) { adWatched = true; adLoaded = false; continueGame(); loadRewardedAd(); }
  } catch(e) { showingAd = false; continueGame(); }
}
function continueGame() {
  state = 'play'; P.alive = true; P.x = W/2; P.vx = 0; P.trail = [];
  spikes = spikes.filter(s => Math.abs(s.y - P.y) > 150);
  lasers = lasers.filter(l => Math.abs(l.x - P.x) > 120);
  particles = []; makeStars();
}

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
// states: 'menu' | 'settings' | 'play' | 'dead'
let state = 'menu';
let score = 0;
let hiScore = parseInt(localStorage.getItem('ns_hi') || '0');
let frame = 0, deadTimer = 0, menuFrame = 0;
let lastSfxScore = 0;

// ─── DIFFICULTY ──────────────────────────
let difficulty = 'normal';
const DIFF = {
  //         base speed   spike interval  laser interval  spike size bonus
  easy:   { spdMult: 0.5, spikeInt: 100, laserInt: 400,  szBonus: 0    },
  normal: { spdMult: 1.0, spikeInt: 65,  laserInt: 250,  szBonus: 8    },
  hard:   { spdMult: 1.7, spikeInt: 35,  laserInt: 140,  szBonus: 16   },
};

// ─── COMBO ───────────────────────────────
let combo = 0, comboTimer = 0;
const COMBO_TIMEOUT = 200;

// ─── SCREEN SHAKE ────────────────────────
let shakeTimer = 0, shakeMag = 0;
function triggerShake(mag, dur) { shakeMag = mag; shakeTimer = dur; }

// ─── THEMES ──────────────────────────────
const THEMES = [
  { bg: '#00000f', accent: '#0ff', name: 'CYAN'   },
  { bg: '#08000f', accent: '#f0f', name: 'PURPLE' },
  { bg: '#0f0000', accent: '#f55', name: 'RED'    },
  { bg: '#0a0500', accent: '#fa0', name: 'GOLD'   },
];
let themeIdx = 0;
function getTheme() { return THEMES[themeIdx]; }

// ─── POWER-UPS ───────────────────────────
const SLOW_DUR = 300;
let slowTimer = 0, slowing = false, shielded = false;

// ─── SETTINGS ────────────────────────────
const S = {
  sound:     true,
  shake:     true,
  controls:  'touch',
  gyroSens:  'medium',
};
try { Object.assign(S, JSON.parse(localStorage.getItem('ns_settings')||'{}')); } catch(e) {}
function saveSettings() { localStorage.setItem('ns_settings', JSON.stringify(S)); }
function triggerShake(mag, dur) {
  if (!S.shake) return;
  shakeMag = mag; shakeTimer = dur;
}

// ─── GYROSCOPE ───────────────────────────
let gyroGamma = 0;
let gyroListening = false;
// Very different sensitivity levels
const GYRO_SENS = { low: 0.012, medium: 0.045, high: 0.10 };

function onGyro(e) {
  if (e.gamma !== null) gyroGamma = e.gamma;
}
function requestGyro() {
  if (gyroListening) return; // already listening
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission()
      .then(r => {
        if (r==='granted') {
          window.addEventListener('deviceorientation', onGyro);
          gyroListening = true;
        }
      }).catch(() => {});
  } else {
    window.removeEventListener('deviceorientation', onGyro); // remove old first
    window.addEventListener('deviceorientation', onGyro);
    gyroListening = true;
  }
}

// ═══════════════════════════════════════════
// PLAYER
// ═══════════════════════════════════════════
const P = {
  x: 0, y: 0, w: 30, vx: 0, alive: true, trail: [],
  reset() { this.x=W/2; this.y=H-110; this.vx=0; this.alive=true; this.trail=[]; }
};

// ═══════════════════════════════════════════
// OBJECTS
// ═══════════════════════════════════════════
let spikes=[], lasers=[], particles=[], powerups=[];
let stars=[], menuParticles=[], hexagons=[];

function makeStars() {
  stars = Array.from({length:100}, () => ({
    x: Math.random()*W, y: Math.random()*H,
    r: Math.random()*1.6+0.2, s: Math.random()*0.5+0.1,
    tw: Math.random()*Math.PI*2
  }));
}
function makeHexagons() {
  hexagons = Array.from({length:5}, () => ({
    x: Math.random()*W, y: Math.random()*H,
    size: 30+Math.random()*80, rot: Math.random()*Math.PI*2,
    rotSpd: (Math.random()-0.5)*0.01,
    alpha: 0.03+Math.random()*0.05,
    col: Math.random()<0.5?'#0ff':'#f0f'
  }));
}

// ═══════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════
const keys = { left: false, right: false };

window.addEventListener('keydown', e => {
  if (e.key==='ArrowLeft')  keys.left=true;
  if (e.key==='ArrowRight') keys.right=true;
  if (e.key===' '||e.key==='Enter') {
    if (state==='menu') beginGame();
  }
});
window.addEventListener('keyup', e => {
  if (e.key==='ArrowLeft')  keys.left=false;
  if (e.key==='ArrowRight') keys.right=false;
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t0 = e.changedTouches[0];
  const tx = t0.clientX, ty = t0.clientY;
  const cx = W/2;

  // ── SETTINGS SCREEN ──
  if (state === 'settings') {
    handleSettingsTap(tx, ty);
    return;
  }

  // ── DEAD SCREEN ──
  if (state === 'dead') {
    if (deadTimer <= 60) return;
    const bW = Math.min(W*0.82, 310), bH = H*0.065;
    const adY    = H*0.645;
    const retryY = adWatched ? H*0.645 : H*0.760;
    const diffY  = H*0.872;
    const menuY  = H*0.938;
    if (!adWatched && Math.abs(tx-cx)<bW/2 && Math.abs(ty-adY)<bH/2) { showRewardedAd(); return; }
    if (Math.abs(tx-cx)<bW/2 && Math.abs(ty-retryY)<bH/2) { beginGame(); return; }
    const dBtnW=Math.min(W*0.26,92), dGap=8;
    const dTotalW=dBtnW*3+dGap*2, dStartX=cx-dTotalW/2;
    const diffs=['easy','normal','hard'];
    for (let i=0;i<3;i++) {
      const bx=dStartX+i*(dBtnW+dGap);
      if (tx>=bx&&tx<=bx+dBtnW&&Math.abs(ty-diffY)<H*0.046) { difficulty=diffs[i]; return; }
    }
    if (Math.abs(ty-menuY)<H*0.035) { state='menu'; return; }
    return;
  }

  // ── MENU SCREEN ──
  if (state === 'menu') {
    // Settings button — top right gear icon
    if (tx > W-60 && ty < 60) { state='settings'; return; }
    const dBtnW=Math.min(W*0.25,88), dBtnH=H*0.048, dGap=8;
    const dTotalW=dBtnW*3+dGap*2, dStartX=cx-dTotalW/2;
    const diffY=H*0.838;
    const diffs=['easy','normal','hard'];
    for (let i=0;i<3;i++) {
      const bx=dStartX+i*(dBtnW+dGap);
      if (tx>=bx&&tx<=bx+dBtnW&&Math.abs(ty-diffY)<dBtnH) { difficulty=diffs[i]; return; }
    }
    beginGame(); return;
  }

  // ── PLAY ──
  if (state === 'play' && S.controls==='touch') {
    if (tx < W/2) keys.left=true; else keys.right=true;
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (S.controls !== 'touch') return;
  let l=false, r=false;
  for (const t of e.targetTouches) { if (t.clientX<W/2) l=true; else r=true; }
  keys.left=l; keys.right=r;
}, { passive: false });

canvas.addEventListener('touchcancel', () => { keys.left=keys.right=false; });

canvas.addEventListener('mousedown', e => {
  const mx=e.clientX, my=e.clientY, cx=W/2;
  if (state==='settings') { handleSettingsTap(mx,my); return; }
  if (state==='dead') {
    if (deadTimer<=60) return;
    const bW=Math.min(W*0.82,310), bH=H*0.065;
    const adY=H*0.645, retryY=adWatched?H*0.645:H*0.760;
    const diffY=H*0.872, menuY=H*0.938;
    if (!adWatched&&Math.abs(mx-cx)<bW/2&&Math.abs(my-adY)<bH/2) { showRewardedAd(); return; }
    if (Math.abs(mx-cx)<bW/2&&Math.abs(my-retryY)<bH/2) { beginGame(); return; }
    const dBtnW=Math.min(W*0.26,92), dGap=8;
    const dStartX=cx-(dBtnW*3+dGap*2)/2;
    const diffs=['easy','normal','hard'];
    for (let i=0;i<3;i++) {
      const bx=dStartX+i*(dBtnW+dGap);
      if (mx>=bx&&mx<=bx+dBtnW&&Math.abs(my-diffY)<H*0.046) { difficulty=diffs[i]; return; }
    }
    if (Math.abs(my-menuY)<H*0.035) { state='menu'; return; }
    return;
  }
  if (state==='menu') {
    if (mx>W-60&&my<60) { state='settings'; return; }
    beginGame(); return;
  }
  if (state==='play'&&S.controls==='touch') { if (mx<W/2) keys.left=true; else keys.right=true; }
});
canvas.addEventListener('mouseup', () => { keys.left=keys.right=false; });

// ═══════════════════════════════════════════
// LIFECYCLE
// ═══════════════════════════════════════════
function beginGame() {
  initAudio(); sfxStart();
  state='play'; frame=0; score=0; lastSfxScore=0;
  adWatched=false;
  combo=0; comboTimer=0;
  shakeTimer=0; shakeMag=0;
  themeIdx=0;
  slowTimer=0; slowing=false; shielded=false;
  spikes=[]; lasers=[]; particles=[]; powerups=[];
  P.reset(); makeStars();
}

function killPlayer() {
  if (!P.alive) return false;
  if (shielded) {
    shielded=false; sfxShieldHit(); triggerShake(6,20);
    combo=0; comboTimer=0;
    for (let i=0;i<24;i++) {
      const a=(Math.PI*2*i)/24;
      particles.push({ x:P.x,y:P.y, vx:Math.cos(a)*(3+Math.random()*4), vy:Math.sin(a)*(3+Math.random()*4), life:1,col:'#ffaa00',r:2+Math.random()*4 });
    }
    return true;
  }
  P.alive=false; state='dead'; deadTimer=0;
  combo=0; comboTimer=0;
  triggerShake(18,35);
  for (let i=0;i<60;i++) {
    const a=(Math.PI*2*i)/60, sp=2+Math.random()*8;
    particles.push({ x:P.x,y:P.y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:1, col:i%3===0?'#0ff':i%3===1?'#f0f':'#ff0', r:2+Math.random()*4 });
  }
  const best = score>hiScore;
  if (best) { hiScore=score; localStorage.setItem('ns_hi',hiScore); }
  sfxDeath();
  if (best) setTimeout(sfxNewBest,400);
  return false;
}

// ═══════════════════════════════════════════
// UPDATE
// ═══════════════════════════════════════════
function update() {
  menuFrame++;

  if (state==='menu') {
    for (const h of hexagons) h.rot+=h.rotSpd;
    if (menuFrame%8===0) menuParticles.push({ x:Math.random()*W, y:H+10, vx:(Math.random()-0.5)*0.8, vy:-(0.5+Math.random()*1.5), life:1, r:1+Math.random()*2, col:Math.random()<0.5?'#0ff':'#f0f' });
    for (let i=menuParticles.length-1;i>=0;i--) {
      const p=menuParticles[i]; p.x+=p.vx; p.y+=p.vy; p.life-=0.004;
      if (p.life<=0||p.y<-10) menuParticles.splice(i,1);
    }
    for (const s of stars) { s.y+=s.s*0.3; s.tw+=0.05; if(s.y>H){s.y=0;s.x=Math.random()*W;} }
    return;
  }

  if (state==='dead') { deadTimer++; tickParticles(); return; }
  if (state!=='play') return;

  frame++;
  score = Math.floor(frame/10);
  const D = DIFF[difficulty];
  // Base speed scales with time AND difficulty
  const spd = (1 + frame/600) * D.spdMult;

  // Theme change every 50 points
  const newIdx = Math.min(Math.floor(score/50), THEMES.length-1);
  if (newIdx!==themeIdx) themeIdx=newIdx;

  // Screen shake
  if (shakeTimer>0) { shakeTimer--; if(shakeTimer===0) shakeMag=0; }

  // Combo timer
  if (comboTimer>0) { comboTimer--; if(comboTimer===0) combo=0; }

  // Slow timer
  if (slowing) {
    slowTimer--;
    if (slowTimer===90) sfxPowerEnd();
    if (slowTimer<=0) slowing=false;
  }
  const speedMult = slowing ? 0.4 : 1;
  const spawnMult = slowing ? 2.5 : 1; // slow = much longer interval between spawns

  // Score blip
  if (score>0 && score%10===0 && score!==lastSfxScore) { lastSfxScore=score; sfxScore(); }

  // Move sound
  if ((keys.left||keys.right) && frame%12===0) sfxMove();

  // Stars
  for (const s of stars) { s.y+=s.s*spd*0.4; s.tw+=0.05; if(s.y>H){s.y=0;s.x=Math.random()*W;} }

  // Player movement — touch or gyro
  const maxVX = 7+spd*0.4;
  if (S.controls === 'gyro') {
    const sens = GYRO_SENS[S.gyroSens];
    const deadzone = 2.5; // ignore tiny tilts
    const tilt = Math.abs(gyroGamma) > deadzone ? gyroGamma : 0;
    P.vx += tilt * sens;
    P.vx *= 0.80; // friction
  } else {
    if (keys.left)  P.vx-=1.6;
    if (keys.right) P.vx+=1.6;
    if (!keys.left&&!keys.right) P.vx*=0.78;
  }
  P.vx=Math.max(-maxVX,Math.min(maxVX,P.vx));
  P.x+=P.vx;
  if (P.x<P.w/2)   { P.x=P.w/2;     P.vx=0; }
  if (P.x>W-P.w/2) { P.x=W-P.w/2;   P.vx=0; }
  P.trail.unshift({x:P.x,y:P.y});
  if (P.trail.length>14) P.trail.pop();

  // Spawn spikes
  const spikeInterval = Math.max(D.spikeInt * 0.4, D.spikeInt - frame/30) * spawnMult;
  if (frame % Math.max(1, Math.floor(spikeInterval)) === 0) {
    const sz = 18 + Math.random()*18 + D.szBonus;
    spikes.push({
      x: sz + Math.random()*(W-sz*2),
      y: -sz*2, sz,
      vy: (2.2 + spd + Math.random()*1.2),
      hue: Math.random()<0.5?'#ff3355':'#ff8800'
    });
  }

  // Spawn lasers
  const laserInterval = Math.max(D.laserInt * 0.5, D.laserInt - frame/20) * spawnMult;
  if (frame % Math.max(1, Math.floor(laserInterval)) === 0) {
    const bW = 28 + Math.random()*20 + D.szBonus*0.5;
    lasers.push({
      x: bW + Math.random()*(W-bW*2),
      beamW: bW, t: 0, warn: 55, total: 130,
      col: Math.random()<0.5?'#f0f':'#ff3355'
    });
  }

  // Spawn power-ups
  if (frame%350===175) {
    powerups.push({ x:40+Math.random()*(W-80), y:-30, vy:1.6+Math.random()*0.8, r:15, pulse:0, type:Math.random()<0.5?'slow':'shield' });
  }

  // Update power-ups
  for (let i=powerups.length-1;i>=0;i--) {
    const pu=powerups[i];
    pu.y+=pu.vy; pu.pulse+=0.07;
    if (pu.y>H+30) { powerups.splice(i,1); continue; }
    const dx=P.x-pu.x, dy=P.y-pu.y;
    if (Math.sqrt(dx*dx+dy*dy)<pu.r+P.w*0.5) {
      const col=pu.type==='slow'?'#4af':'#ffaa00';
      for (let j=0;j<20;j++) {
        const a=(Math.PI*2*j)/20;
        particles.push({ x:pu.x,y:pu.y, vx:Math.cos(a)*(2+Math.random()*3), vy:Math.sin(a)*(2+Math.random()*3), life:1,col,r:2+Math.random()*3 });
      }
      if (pu.type==='slow') { slowing=true; slowTimer=SLOW_DUR; sfxPowerSlow(); }
      else { shielded=true; sfxPowerShield(); }
      powerups.splice(i,1);
    }
  }

  // Update spikes
  for (let i=spikes.length-1;i>=0;i--) {
    const s=spikes[i];
    s.y+=s.vy*speedMult;
    if (s.y>H+s.sz*2) {
      spikes.splice(i,1);
      combo++; comboTimer=COMBO_TIMEOUT;
      sfxCombo(combo<=1?0:combo<=3?1:combo<=6?2:3);
      continue;
    }
    const dx=P.x-s.x, dy=P.y-s.y;
    if (Math.sqrt(dx*dx+dy*dy)<s.sz*0.7+P.w*0.45) {
      const absorbed=killPlayer(); spikes.splice(i,1);
      if (!absorbed) return; break;
    }
  }

  // Update lasers
  for (let i=lasers.length-1;i>=0;i--) {
    const l=lasers[i];
    if (!slowing||Math.random()<speedMult) l.t++;
    if (l.t>l.total) { lasers.splice(i,1); continue; }
    if (l.t===1) sfxLaserWarn();
    if (l.t===l.warn) sfxLaserFire();
    if (l.t>=l.warn&&l.t<l.total) {
      if (Math.abs(P.x-l.x)<l.beamW/2+P.w*0.4) {
        const absorbed=killPlayer(); lasers.splice(i,1);
        if (!absorbed) return; break;
      }
    }
  }

  tickParticles();
}

function tickParticles() {
  for (let i=particles.length-1;i>=0;i--) {
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.14; p.life-=0.022;
    if (p.life<=0) particles.splice(i,1);
  }
}

// ═══════════════════════════════════════════
// DRAW HELPERS
// ═══════════════════════════════════════════
function glow(col,blur)  { ctx.shadowColor=col; ctx.shadowBlur=blur; }
function noGlow()        { ctx.shadowBlur=0; }
function roundRect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

// ═══════════════════════════════════════════
// DRAW BACKGROUND
// ═══════════════════════════════════════════
function drawBG() {
  const T = getTheme();
  ctx.save();
  if (shakeTimer>0) ctx.translate((Math.random()-0.5)*shakeMag,(Math.random()-0.5)*shakeMag);
  ctx.fillStyle=T.bg; ctx.fillRect(-20,-20,W+40,H+40);
  // Stars only — no grid
  for (const s of stars) {
    ctx.globalAlpha=0.3+0.5*Math.abs(Math.sin(s.tw));
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  ctx.restore();
}

function drawMenuBG() {
  ctx.fillStyle='#00000f'; ctx.fillRect(0,0,W,H);
  // Radial glow
  const grad=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,H*0.7);
  grad.addColorStop(0,'rgba(0,255,255,0.04)');
  grad.addColorStop(0.5,'rgba(255,0,255,0.02)');
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
  // Stars
  for (const s of stars) {
    ctx.globalAlpha=0.2+0.6*Math.abs(Math.sin(s.tw));
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  // Hexagons
  for (const h of hexagons) {
    ctx.globalAlpha=h.alpha; ctx.strokeStyle=h.col; ctx.lineWidth=1.5;
    glow(h.col,8);
    ctx.beginPath();
    for (let i=0;i<6;i++) { const a=h.rot+(Math.PI/3)*i; const px=h.x+h.size*Math.cos(a), py=h.y+h.size*Math.sin(a); i===0?ctx.moveTo(px,py):ctx.lineTo(px,py); }
    ctx.closePath(); ctx.stroke(); noGlow(); ctx.globalAlpha=1;
  }
  // Menu particles
  for (const p of menuParticles) {
    ctx.globalAlpha=p.life*0.7; glow(p.col,10);
    ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1; noGlow();
}

// ═══════════════════════════════════════════
// DRAW PLAYER
// ═══════════════════════════════════════════
function drawPlayer() {
  if (!P.alive) return;
  const T=getTheme();
  // Trail
  for (let i=P.trail.length-1;i>=0;i--) {
    const t=P.trail[i];
    ctx.globalAlpha=(1-i/P.trail.length)*0.3;
    ctx.fillStyle=T.accent;
    ctx.beginPath(); ctx.arc(t.x,t.y,(1-i/P.trail.length)*P.w*0.55,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  // Shield ring
  if (shielded) {
    const pulse=0.5+0.5*Math.sin(menuFrame/10);
    ctx.globalAlpha=0.4*pulse; glow('#ffaa00',20);
    ctx.strokeStyle='#ffaa00'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(P.x,P.y,P.w+14,0,Math.PI*2); ctx.stroke();
    noGlow(); ctx.globalAlpha=1;
  }
  // Diamond
  const x=P.x, y=P.y, s=P.w/2;
  glow(T.accent,28); ctx.fillStyle=T.accent;
  ctx.beginPath(); ctx.moveTo(x,y-s); ctx.lineTo(x+s*0.7,y); ctx.lineTo(x,y+s*0.7); ctx.lineTo(x-s*0.7,y); ctx.closePath(); ctx.fill();
  noGlow(); ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.moveTo(x,y-s*0.45); ctx.lineTo(x+s*0.32,y); ctx.lineTo(x,y+s*0.32); ctx.lineTo(x-s*0.32,y); ctx.closePath(); ctx.fill();
}

// ═══════════════════════════════════════════
// DRAW SPIKES
// ═══════════════════════════════════════════
function drawSpikes() {
  for (const s of spikes) {
    glow(s.hue,20); ctx.strokeStyle=s.hue; ctx.fillStyle=s.hue+'55'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(s.x,s.y+s.sz); ctx.lineTo(s.x-s.sz*0.75,s.y-s.sz*0.5); ctx.lineTo(s.x+s.sz*0.75,s.y-s.sz*0.5); ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(s.x,s.y+s.sz*0.45,3,0,Math.PI*2); ctx.fill();
    noGlow();
  }
}

// ═══════════════════════════════════════════
// DRAW LASERS
// ═══════════════════════════════════════════
function drawLasers() {
  for (const l of lasers) {
    if (l.t<l.warn) {
      const blink=Math.floor(l.t/6)%2===0;
      const wa=0.3+0.7*(l.t/l.warn);
      ctx.globalAlpha=blink?wa:wa*0.25; glow(l.col,14);
      ctx.strokeStyle=l.col; ctx.lineWidth=3; ctx.setLineDash([12,9]);
      ctx.beginPath(); ctx.moveTo(l.x,0); ctx.lineTo(l.x,H); ctx.stroke();
      ctx.setLineDash([]); noGlow();
      ctx.globalAlpha=blink?0.12:0.04; ctx.fillStyle=l.col;
      ctx.fillRect(l.x-l.beamW/2,0,l.beamW,H);
      ctx.globalAlpha=blink?0.9:0.3; glow(l.col,16);
      ctx.strokeStyle=l.col; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(l.x-20,P.y); ctx.lineTo(l.x-6,P.y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(l.x+6,P.y); ctx.lineTo(l.x+20,P.y); ctx.stroke();
      ctx.beginPath(); ctx.arc(l.x,P.y,14,0,Math.PI*2); ctx.stroke();
      noGlow();
      ctx.globalAlpha=blink?1:0.4; ctx.fillStyle=l.col;
      ctx.font=`bold ${Math.round(H*0.022)}px monospace`; ctx.textAlign='center';
      glow(l.col,10); ctx.fillText('⚠',l.x,36); noGlow();
      ctx.globalAlpha=1;
    } else {
      const prog=(l.t-l.warn)/(l.total-l.warn);
      const fade=prog<0.08?prog/0.08:prog>0.65?(1-prog)/0.35:1;
      ctx.globalAlpha=0.12*fade; glow(l.col,50);
      ctx.strokeStyle=l.col; ctx.lineWidth=l.beamW*2.5;
      ctx.beginPath(); ctx.moveTo(l.x,0); ctx.lineTo(l.x,H); ctx.stroke();
      ctx.globalAlpha=0.35*fade; ctx.lineWidth=l.beamW;
      ctx.beginPath(); ctx.moveTo(l.x,0); ctx.lineTo(l.x,H); ctx.stroke();
      ctx.globalAlpha=fade; ctx.strokeStyle='#fff'; ctx.lineWidth=l.beamW*0.35;
      glow('#fff',10);
      ctx.beginPath(); ctx.moveTo(l.x,0); ctx.lineTo(l.x,H); ctx.stroke();
      noGlow(); ctx.globalAlpha=1;
    }
  }
  ctx.globalAlpha=1; ctx.setLineDash([]);
}

// ═══════════════════════════════════════════
// DRAW POWER-UPS
// ═══════════════════════════════════════════
function drawPowerups() {
  for (const pu of powerups) {
    const pulse=0.7+0.3*Math.sin(pu.pulse);
    const col=pu.type==='slow'?'#4af':'#ffaa00';
    const label=pu.type==='slow'?'SLOW':'SHIELD';
    ctx.globalAlpha=0.25*pulse; glow(col,22);
    ctx.strokeStyle=col; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(pu.x,pu.y,pu.r+9,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=0.85*pulse; ctx.fillStyle=col; glow(col,18);
    ctx.beginPath(); ctx.arc(pu.x,pu.y,pu.r,0,Math.PI*2); ctx.fill();
    noGlow();
    ctx.globalAlpha=1; ctx.fillStyle='#000';
    ctx.font=`bold ${Math.round(pu.r*1.1)}px monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(pu.type==='slow'?'«':'+',pu.x,pu.y);
    ctx.textBaseline='alphabetic';
    for (let i=0;i<4;i++) {
      const a=pu.pulse+(Math.PI/2)*i;
      ctx.globalAlpha=0.7*pulse; ctx.fillStyle=col; glow(col,8);
      ctx.beginPath(); ctx.arc(pu.x+Math.cos(a)*(pu.r+14),pu.y+Math.sin(a)*(pu.r+14),2.5,0,Math.PI*2); ctx.fill();
    }
    noGlow(); ctx.globalAlpha=pulse; ctx.fillStyle=col;
    ctx.font=`bold ${Math.round(H*0.017)}px monospace`; ctx.textAlign='center';
    glow(col,8); ctx.fillText(label,pu.x,pu.y-pu.r-12); noGlow();
    ctx.globalAlpha=1;
  }
}

    ctx.fillStyle=bcol; ctx.font=`bold ${Math.round(H*0.018)}px monospace`;
    ctx.textAlign='center'; ctx.fillText('❄ SLOW',W/2,barBaseY-5);

  // Shield indicator

    ctx.font=`${Math.round(H*0.018)}px monospace`;
    ctx.fillText('~ GYRO ~',W/2,H-SAFEb-8);
    ctx.globalAlpha=1;
  }
  ctx.textAlign='center';
}

// ═══════════════════════════════════════════
// SETTINGS LOGIC
// ═══════════════════════════════════════════
function handleSettingsTap(tx, ty) {
  const cx=W/2, rowH=H*0.095;
  const startY=H*0.28;

  // Back button
  if (ty < H*0.12) { state='menu'; return; }

  // Sound toggle
  if (Math.abs(ty-(startY+rowH*0))<rowH/2) { S.sound=!S.sound; saveSettings(); return; }
  // Shake toggle
  if (Math.abs(ty-(startY+rowH*1))<rowH/2) { S.shake=!S.shake; saveSettings(); return; }
  // Controls — touch/gyro
  if (Math.abs(ty-(startY+rowH*2))<rowH/2) {
    if (S.controls==='touch') {
      S.controls='gyro';
      gyroListening = false; // force re-request
      requestGyro();
    } else {
      S.controls='touch';
      keys.left=false; keys.right=false;
    }
    saveSettings(); return;
  }
  // Gyro sensitivity — only if gyro active
  if (S.controls==='gyro' && Math.abs(ty-(startY+rowH*3))<rowH/2) {
    const sens=['low','medium','high'];
    const idx=sens.indexOf(S.gyroSens);
    S.gyroSens=sens[(idx+1)%3];
    saveSettings(); return;
  }
}

  ctx.font=`bold ${Math.round(H*0.030)}px monospace`;
  ctx.textBaseline='middle'; glow('#0ff',10);
  ctx.fillText('▶  TAP TO START',cx,btnY); noGlow();
  ctx.textBaseline='alphabetic'; ctx.globalAlpha=1;

  // ── Difficulty selector ──
  const dBtnW=Math.min(W*0.25,88), dBtnH=H*0.048, dGap=8;
  const dTotalW=dBtnW*3+dGap*2, dStartX=cx-dTotalW/2;
  const diffY=H*0.838;
  const diffs=['easy','normal','hard'];
  const dlabels=['EASY','NRM','HARD'];
  const dcols=['#00ff88','#0ff','#f55'];

  ctx.font=`${Math.round(H*0.015)}px monospace`; ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.textBaseline='alphabetic'; ctx.fillText('DIFFICULTY',cx,diffY-dBtnH/2-6);

  diffs.forEach((d,i) => {
    const bx=dStartX+i*(dBtnW+dGap), by=diffY-dBtnH/2;
    const active=difficulty===d, col=dcols[i];
    ctx.globalAlpha=active?1:0.35;
    if (active) { glow(col,16); ctx.globalAlpha=0.2; ctx.fillStyle=col; roundRect(bx,by,dBtnW,dBtnH,6); ctx.fill(); ctx.globalAlpha=1; }
    glow(active?col:'none',active?14:0);
    ctx.strokeStyle=col; ctx.lineWidth=active?2.5:1.5;
    roundRect(bx,by,dBtnW,dBtnH,6); ctx.stroke(); noGlow();
    ctx.globalAlpha=active?1:0.4; ctx.fillStyle=active?col:'#fff';
    ctx.font=`bold ${Math.round(H*0.019)}px monospace`;
    ctx.textBaseline='middle'; ctx.fillText(dlabels[i],bx+dBtnW/2,diffY);
    ctx.textBaseline='alphabetic'; ctx.globalAlpha=1;
  });

  // ── Best score badge ──
  const badgeY=H*0.928;
  if (hiScore>0) {
    const bW=170, bH2=32;
    ctx.globalAlpha=0.15; ctx.fillStyle='#f0f';
    roundRect(cx-bW/2,badgeY-bH2/2,bW,bH2,20); ctx.fill();
    ctx.globalAlpha=0.5; ctx.strokeStyle='#f0f'; ctx.lineWidth=1;
    roundRect(cx-bW/2,badgeY-bH2/2,bW,bH2,20); ctx.stroke();
    ctx.globalAlpha=1; ctx.fillStyle='#f0f';
    ctx.font=`bold ${Math.round(H*0.020)}px monospace`;
    glow('#f0f',8); ctx.textBaseline='middle';
    ctx.fillText('✦ BEST  '+String(hiScore).padStart(4,'0'),cx,badgeY);
    noGlow(); ctx.textBaseline='alphabetic';
  } else {
    ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.font=`${Math.round(H*0.017)}px monospace`;
    ctx.fillText('NO RECORD YET',cx,badgeY+6);
  }
  ctx.globalAlpha=1;
}

// ═══════════════════════════════════════════
// DRAW DEAD
// ═══════════════════════════════════════════
function drawDead() {
  drawBG(); drawParticles();
  const cx=W/2;
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';

  // ── GAME OVER ──
  ctx.font=`bold ${Math.round(H*0.092)}px monospace`;
  glow('#f0f',40); ctx.fillStyle='rgba(255,0,255,0.12)';
  ctx.fillText('GAME',cx,H*0.22); ctx.fillText('OVER',cx,H*0.34);
  glow('#f0f',20); ctx.fillStyle='#f0f';
  ctx.fillText('GAME',cx,H*0.22); ctx.fillText('OVER',cx,H*0.34);
  noGlow();

  // ── Score box ──
  const sbY=H*0.455, sbW=Math.min(W*0.62,250), sbH=H*0.10;
  ctx.globalAlpha=0.1; ctx.fillStyle='#0ff';
  roundRect(cx-sbW/2,sbY-sbH/2,sbW,sbH,10); ctx.fill();
  ctx.globalAlpha=0.3; ctx.strokeStyle='#0ff'; ctx.lineWidth=1.5;
  roundRect(cx-sbW/2,sbY-sbH/2,sbW,sbH,10); ctx.stroke();
  ctx.globalAlpha=1; ctx.fillStyle='#0ff';
  ctx.font=`${Math.round(H*0.020)}px monospace`;
  ctx.fillText('SCORE',cx,sbY-6);
  glow('#0ff',14); ctx.font=`bold ${Math.round(H*0.042)}px monospace`;
  ctx.fillText(String(score).padStart(4,'0'),cx,sbY+H*0.032); noGlow();

  // ── New best ──
  if (score>0&&score>=hiScore) {
    const p2=0.5+0.5*Math.sin(Date.now()/300);
    ctx.globalAlpha=p2; glow('#ff0',18); ctx.fillStyle='#ff0';
    ctx.font=`bold ${Math.round(H*0.026)}px monospace`;
    ctx.fillText('✦  NEW BEST  ✦',cx,H*0.565);
    ctx.globalAlpha=1; noGlow();
  }

  // ── Best score — shown clearly, not overlapping anything ──
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.font=`${Math.round(H*0.019)}px monospace`;
  ctx.fillText('BEST: '+String(hiScore).padStart(4,'0'),cx,H*0.598);

  if (deadTimer>60) {
    const pulse=0.6+0.4*Math.sin(Date.now()/420);
    const bW=Math.min(W*0.82,310), bH=H*0.065;
    const adY       = H*0.645;
    const keepY     = adY + bH/2 + 18;   // text sits right below ad button
    const retryY    = adWatched ? H*0.645 : H*0.760;  // pushed further down
    const diffLabelY= H*0.828;
    const diffY     = H*0.872;
    const menuY     = H*0.938;

    // ── Watch Ad button ──
    if (!adWatched) {
      ctx.globalAlpha=0.2*pulse; ctx.fillStyle='#ffaa00';
      roundRect(cx-bW/2,adY-bH/2,bW,bH,10); ctx.fill();
      ctx.globalAlpha=pulse; glow('#ffaa00',22); ctx.strokeStyle='#ffaa00'; ctx.lineWidth=2.5;
      roundRect(cx-bW/2,adY-bH/2,bW,bH,10); ctx.stroke(); noGlow();
      ctx.globalAlpha=pulse; ctx.fillStyle='#fff';
      ctx.font=`bold ${Math.round(H*0.024)}px monospace`;
      ctx.textBaseline='middle'; glow('#ffaa00',10);
      ctx.fillText('▶ WATCH AD · CONTINUE',cx,adY); noGlow();
      ctx.textBaseline='alphabetic';
      // "keep your score!" — sits in the gap between ad and retry buttons
      ctx.globalAlpha=0.7; ctx.fillStyle='#ffdd88';
      ctx.font=`${Math.round(H*0.016)}px monospace`;
      ctx.textBaseline='middle';
      ctx.fillText('★  keep your score!  ★',cx,keepY + (retryY - bH/2 - keepY)/2);
      ctx.textBaseline='alphabetic';
      ctx.globalAlpha=1;
    }

    // ── Retry button ──
    ctx.globalAlpha=0.12*pulse; ctx.fillStyle='#0ff';
    roundRect(cx-bW/2,retryY-bH/2,bW,bH,10); ctx.fill();
    ctx.globalAlpha=pulse; glow('#0ff',16); ctx.strokeStyle='#0ff'; ctx.lineWidth=2;
    roundRect(cx-bW/2,retryY-bH/2,bW,bH,10); ctx.stroke(); noGlow();
    ctx.globalAlpha=pulse; ctx.fillStyle='#fff';
    ctx.font=`bold ${Math.round(H*0.024)}px monospace`;
    ctx.textBaseline='middle'; glow('#0ff',8);
    ctx.fillText('▶  TAP TO RETRY',cx,retryY); noGlow();
    ctx.textBaseline='alphabetic'; ctx.globalAlpha=1;

    // ── CHANGE DIFFICULTY label — clearly above buttons ──
    ctx.globalAlpha=0.4; ctx.fillStyle='#fff';
    ctx.font=`${Math.round(H*0.014)}px monospace`;
    ctx.fillText('CHANGE DIFFICULTY',cx,diffLabelY);
    ctx.globalAlpha=1;

    // ── Difficulty buttons ──
    const dBtnW=Math.min(W*0.26,92), dBtnH=H*0.046, dGap=8;
    const dTotalW=dBtnW*3+dGap*2, dStartX=cx-dTotalW/2;
    const diffs2=['easy','normal','hard'];
    const dlabels2=['EASY','NRM','HARD'];
    const dcols2=['#00ff88','#0ff','#f55'];
    diffs2.forEach((d,i) => {
      const bx=dStartX+i*(dBtnW+dGap), by=diffY-dBtnH/2;
      const active=difficulty===d, col=dcols2[i];
      if (active) {
        ctx.globalAlpha=0.2; ctx.fillStyle=col;
        roundRect(bx,by,dBtnW,dBtnH,6); ctx.fill();
      }
      ctx.globalAlpha=active?1:0.35;
      glow(active?col:'none',active?14:0);
      ctx.strokeStyle=col; ctx.lineWidth=active?2.5:1.5;
      roundRect(bx,by,dBtnW,dBtnH,6); ctx.stroke(); noGlow();
      ctx.globalAlpha=active?1:0.4; ctx.fillStyle=active?col:'#fff';
      ctx.font=`bold ${Math.round(H*0.019)}px monospace`;
      ctx.textBaseline='middle'; ctx.fillText(dlabels2[i],bx+dBtnW/2,diffY);
      ctx.textBaseline='alphabetic'; ctx.globalAlpha=1;
    });

    // ── Main Menu button ──
    ctx.globalAlpha=0.75; glow('#fff',6); ctx.fillStyle='#fff';
    ctx.font=`bold ${Math.round(H*0.020)}px monospace`;
    ctx.textBaseline='middle'; ctx.textAlign='center';
    ctx.fillText('◀  MAIN MENU',cx,menuY);
    noGlow(); ctx.textBaseline='alphabetic'; ctx.globalAlpha=1;
  }
}

// ═══════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════
function loop() {
  update();
  if (state==='menu')      drawMenu();
  else if (state==='settings') drawSettings();
  else if (state==='play') { drawBG(); drawParticles(); drawPowerups(); drawLasers(); drawSpikes(); drawPlayer(); drawHUD(); }
  else if (state==='dead') drawDead();
  requestAnimationFrame(loop);
}

makeStars();
makeHexagons();
initAdMob();
loop();
</script>
</body>
